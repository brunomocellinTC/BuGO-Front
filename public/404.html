<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />

    <script>
      const pathname = window.location.pathname;
      const search = window.location.search;
      const hash = window.location.hash;

      const redirect =
        "/BuGO-Front/" +
        "?redirect=" +
        encodeURIComponent(pathname + search + hash);

      window.location.replace(redirect);
    </script>
  </head>
  <body></body>
</html>
